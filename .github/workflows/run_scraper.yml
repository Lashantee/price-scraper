name: Run Price Scraper

on:
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 🛠️ ეს ნაბიჯი უზრუნველყოფს, რომ Linux სერვერს ჰქონდეს Chrome-ის ყველა საჭირო ბიბლიოთეკა
    - name: Install Chrome and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxss1 libappindicator1 libgconf-2-4 libxi6 libgbm1

    - name: Install dependencies
      run: |
        pip install pandas openpyxl selenium webdriver-manager

    - name: Run Scraper
      run: python scraper.py

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: განახლებული-ფასები
        path: fasebi_ganaxlebuli.xlsx
